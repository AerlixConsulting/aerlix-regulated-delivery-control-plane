name: Feature Request
description: Suggest a new feature or enhancement for the control plane
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please describe it in as much detail as possible.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      multiple: true
      options:
        - Requirements Traceability
        - Control Mapping (NIST / FedRAMP)
        - Evidence Collection
        - Supply-Chain / SBOM
        - Policy Engine / Release Gates
        - Audit Export
        - Incident & Exception Management
        - API (FastAPI)
        - Frontend Dashboard (React)
        - CLI (Typer)
        - Kubernetes / Deployment
        - CI/CD Workflows
        - Documentation
        - Security
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What is the use case?
      placeholder: "As a compliance officer, I need to ... so that I can ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your proposed solution in detail.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why is this one better?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocking regulated release)
        - High (significant compliance impact)
        - Medium (nice-to-have improvement)
        - Low (future consideration)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples.
    validations:
      required: false
