apiVersion: apps/v1
kind: Deployment
metadata:
  name: aerlix-frontend
  namespace: aerlix
  labels:
    app.kubernetes.io/name: aerlix-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: aerlix-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aerlix-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: aerlix-frontend
        app.kubernetes.io/name: aerlix-frontend
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
      containers:
        - name: frontend
          image: ghcr.io/aerlixconsulting/aerlix-regulated-delivery-control-plane/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aerlix-frontend
  namespace: aerlix
  labels:
    app.kubernetes.io/name: aerlix-frontend
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: aerlix-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
