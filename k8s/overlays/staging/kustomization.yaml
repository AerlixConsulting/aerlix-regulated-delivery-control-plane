apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aerlix-staging

resources:
  - ../../base

namePrefix: staging-

patches:
  - target:
      kind: Deployment
      name: aerlix-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: aerlix-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: ghcr.io/aerlixconsulting/aerlix-regulated-delivery-control-plane/api
    newTag: staging
  - name: ghcr.io/aerlixconsulting/aerlix-regulated-delivery-control-plane/frontend
    newTag: staging

commonLabels:
  environment: staging
