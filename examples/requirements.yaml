requirements:
  - req_id: REQ-001
    title: All API endpoints must require authentication
    description: |
      Every REST endpoint exposed by PaymentsAPI must validate a signed JWT token.
      Unauthenticated requests must receive a 401 Unauthorized response.
    type: security
    status: verified
    priority: critical
    source: PCI-DSS 8.2
    controls:
      - AC-2
      - AC-3

  - req_id: REQ-002
    title: All transactions must be logged to the audit database
    description: |
      PaymentsAPI must write a structured audit record for every payment transaction
      attempt, including success and failure outcomes.
    type: regulatory
    status: implemented
    priority: critical
    source: PCI-DSS 10.2
    controls:
      - AU-6

  - req_id: REQ-003
    title: Dependency vulnerabilities must be scanned before release
    description: |
      All third-party dependencies must be scanned for known CVEs via Trivy
      prior to every production release.
    type: security
    status: verified
    priority: high
    source: NIST-800-53 RA-5
    controls:
      - RA-5

  - req_id: REQ-004
    title: Infrastructure changes must follow change control process
    description: |
      All changes to production infrastructure must go through the CAB approval process
      and be documented with a change ticket.
    type: regulatory
    status: approved
    priority: high
    source: NIST-800-53 CM-3
    controls:
      - CM-3

  - req_id: REQ-005
    title: Security patches must be applied within SLA
    description: |
      Critical security patches must be applied within 7 calendar days of availability.
      High-severity patches must be applied within 30 days.
    type: security
    status: implemented
    priority: critical
    source: FedRAMP SI-2
    controls:
      - SI-2

  - req_id: REQ-006
    title: All container images must include an SBOM
    description: |
      Every container image published to the registry must have an attached
      CycloneDX SBOM generated by Syft.
    type: security
    status: implemented
    priority: high
    source: EO 14028 §4(e)
    controls:
      - SA-10

  - req_id: REQ-007
    title: User accounts must be reviewed quarterly
    description: |
      A quarterly review of all system accounts must be conducted and documented.
      Unused accounts must be disabled within 5 business days of review.
    type: regulatory
    status: approved
    priority: medium
    source: NIST-800-53 AC-2
    controls:
      - AC-2

  - req_id: REQ-008
    title: Continuous monitoring must be in place
    description: |
      Automated monitoring dashboards must report security posture in near-real-time.
      Alerts must be configured for critical security events.
    type: security
    status: implemented
    priority: high
    source: FedRAMP CA-7
    controls:
      - CA-7
